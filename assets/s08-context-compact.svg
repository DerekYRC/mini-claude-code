每轮 LLM 调用前</text>
  <rect x="290.0" y="100.0" width="380.0" height="56.0" rx="10.0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="118.0" text-anchor="middle" class="node-type">LAYER 1</text>
  <text x="480.0" y="134.0" text-anchor="middle" class="node-title">L1: toolResultBudget
last result &gt; 200KB → persist to disk
context keeps path only</text>
  <rect x="290.0" y="184.0" width="380.0" height="56.0" rx="10.0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="202.0" text-anchor="middle" class="node-type">LAYER 2</text>
  <text x="480.0" y="218.0" text-anchor="middle" class="node-title">L2: snipCompact
&gt; 50 messages → cut middle
head=3, tail=47, protect pairs</text>
  <rect x="290.0" y="268.0" width="380.0" height="56.0" rx="10.0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="286.0" text-anchor="middle" class="node-type">LAYER 3</text>
  <text x="480.0" y="302.0" text-anchor="middle" class="node-title">L3: microCompact
keep recent 3, old →
"[Earlier tool result compacted]"</text>
  <rect x="340.0" y="352.0" width="280.0" height="56.0" rx="10.0" fill="#fff7ed" stroke="#f97316" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="370.0" text-anchor="middle" class="node-type">LAYER 4</text>
  <text x="480.0" y="386.0" text-anchor="middle" class="node-title">L4: compactHistory
&gt; 50KB → save transcript
→ LLM summary</text>
  <rect x="300.0" y="448.0" width="360.0" height="56.0" rx="10.0" fill="#fef2f2" stroke="#dc2626" stroke-width="2.0" filter="url(#shadowSoft)"/>
  <text x="480.0" y="476.0" text-anchor="middle" class="node-title">prompt_is_too_long?
reactiveCompact
summary + keep last 10 → retry</text>
  <rect x="416.5" y="156.0" width="91" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="462.0" y="170.0" text-anchor="middle" class="arrow-label">cheap first</text>
  <rect x="420.0" y="240.0" width="84" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="462.0" y="254.0" text-anchor="middle" class="arrow-label">then finer</text>
  <rect x="413.5" y="324.0" width="147" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="487.0" y="338.0" text-anchor="middle" class="arrow-label">still too big → LLM</text>
  <rect x="365.0" y="414.0" width="154" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="442.0" y="428.0" text-anchor="middle" class="arrow-label">API error → reactive</text>
